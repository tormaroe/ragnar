name: Gemini Auto Coder

on:
  issues:
    types: [labeled]

jobs:
  code-generation:
    if: github.event.label.name == 'gemini'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install google-genai

      - name: Run Gemini Auto Coder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/gemini_coder.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(ai): solve issue #${{ github.event.issue.number }} using Gemini"
          title: "Gemini solution for: ${{ github.event.issue.title }}"
          body: |
            This Pull Request was automatically generated by Gemini based on the description in Issue #${{ github.event.issue.number }}.
            
            It compiled successfully and passed all unit tests on the runner.
            
            Please review the changes before merging.
          branch: gemini-patch-${{ github.event.issue.number }}
          delete-branch: true
